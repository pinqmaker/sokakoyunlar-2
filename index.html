<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ses Kaydı</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 15px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    width: 90%;
    max-width: 340px;
    transform: scale(0.9);
  }

  #timer {
    font-size: 36px;
    font-weight: bold;
    color: #2EA8DB;
  }

  .status { margin-top: 5px; font-size: 12px; color: #666; }

  .pulse {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  .level-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
  }

  .bar-bg {
    flex: 1;
    height: 10px;
    background: #e0e3ef;
    border-radius: 10px;
    overflow: hidden;
  }

  #levelBar {
    height: 100%;
    width: 0%;
    background: green;
    transition: width 0.1s linear;
  }

  #levelValue {
    font-size: 14px;
    font-weight: bold;
    min-width: 35px;
    color: #333;
  }
</style>
</head>

<body>

<div class="card">
  <div class="label">Kalan Süre</div>
  <div id="timer">5</div>
  <div class="status" id="status">Hazır</div>
  <div class="level-container">
    <div class="bar-bg">
      <div id="levelBar"></div>
    </div>
    <div id="levelValue">0</div>
  </div>
</div>

<script>

let stream;
let countdown = 5;
let timerInterval;
let levelInterval;
let audioContext;
let analyser;
let microphone;
let dataArray;
let levels = [];

function startTimer() {
  countdown = 5;
  document.getElementById("timer").innerText = countdown;

  timerInterval = setInterval(() => {
    countdown--;
    document.getElementById("timer").innerText = countdown;
    if (countdown <= 0) {
      stopMeasurement();
    }
  }, 1000);
}

async function startRecording() {
  levels = [];

  document.getElementById("status").innerHTML =
    '<span class="pulse"></span> Ölçüm yapılıyor';

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  await audioContext.resume();

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  microphone = audioContext.createMediaStreamSource(stream);
  microphone.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  startLevelLoop();
  startTimer();
}

function startLevelLoop() {
  clearInterval(levelInterval);

  levelInterval = setInterval(() => {
    analyser.getByteTimeDomainData(dataArray);

    let sumSquares = 0;
    for (let i = 0; i < dataArray.length; i++) {
      let v = (dataArray[i] - 128) / 128;
      sumSquares += v * v;
    }

    let rms = Math.sqrt(sumSquares / dataArray.length);
    let db = 20 * Math.log10(rms);
    if (db === -Infinity) db = -100;
    db = Math.max(-100, Math.min(0, db));

    let level = Math.pow((db + 60) / 60, 1.5) * 100;
    if (!isFinite(level) || isNaN(level)) level = 10;
    level = Math.max(0, Math.min(100, Math.round(level)));

    levels.push(level);
    document.getElementById("levelBar").style.width = level + "%";
    document.getElementById("levelValue").innerText = level;
  }, 100);
}

function stopMeasurement() {
  clearInterval(timerInterval);
  clearInterval(levelInterval);

  let avg = 0;
  if (levels.length > 0) {
    let total = levels.reduce((a, b) => a + b, 0);
    avg = Math.round(total / levels.length);
  }

  document.getElementById("status").innerText = "Ortalama Ses Seviyesi: " + avg;

  try {
    let player = window.parent.GetPlayer();
    player.SetVar("ses_deger", avg);
  } catch (e) {}

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
}

// Sayfa açılınca otomatik başla
window.onload = () => startRecording();

</script>

</body>
</html>
